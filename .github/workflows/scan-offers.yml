name: Cerca offerte
on:
  workflow_dispatch:
  schedule:
    - cron: '15 5,17 * * *'
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Leggi Foglio Google e cerca offerte
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_CODE: ${{ secrets.APPS_SCRIPT_CODE }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: node scripts/scan-offers.mjs
      - name: Salva le offerte nel repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/offerte.json
          git diff --cached --quiet || git commit -m "Aggiorna offerte"
          git push
